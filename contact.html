<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Contact us</title>

   <!-- font awesome cdn link  -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

   <!-- custom css file link  -->
   <link rel="stylesheet" href="css/style.css">

</head>

<body>

   <header class="header">

      <section class="flex">

         <a href="index.html" class="logo">Educa.</a>

         <nav class="header-nav">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="courses.html">Courses</a>
            <a href="contact.html" class="active-link">Contact us</a>
         </nav>

         <div class="icons">
            <div id="toggle-btn" class="fas fa-sun"></div>
            <div id="user-btn" class="fas fa-user"></div>
         </div>

         <div class="profile">
            <img src="images/pic-1.jpg" class="image" alt="">
            <h3 class="name" id="header-user-name">Guest</h3>
            <p class="role">Student</p>
            <div class="flex-btn">
               <a href="login.html" class="option-btn">Login</a>
               <a href="register.html" class="option-btn">Register</a>
            </div>
         </div>

      </section>

   </header>

   <div class="page-wrapper">

      <section class="contact">

         <div class="row">

            <div class="image">
               <img src="images/contact-img.svg" alt="">
            </div>

            <form action="" method="post">
               <h3>Get in touch</h3>
               <input type="text" placeholder="Enter your name" name="name" required maxlength="50" class="box">
               <input type="email" placeholder="Enter your email" name="email" required maxlength="50" class="box">
               <input type="number" placeholder="Enter your number" name="number" required maxlength="50" class="box">
               <textarea name="msg" class="box" placeholder="Enter your message" required maxlength="1000" cols="30"
                  rows="10"></textarea>
               <button type="button" onclick="handleContactSubmit()" class="inline-btn">Send message</button>
            </form>

         </div>

         <div class="box-container">

            <div class="box">
               <i class="fas fa-phone"></i>
               <h3>Phone number</h3>
               <a href="tel:9874563215">9874563215</a>
               <a href="tel:4561237892">4561237892</a>
            </div>

            <div class="box">
               <i class="fas fa-envelope"></i>
               <h3>Email address</h3>
               <a href="mailto:support@gmail.com">support@gmail.com</a>
               <a href="mailto:info.apxgp@gmail.com">info.apxgp@gmail.com</a>
            </div>

            <div class="box">
               <i class="fas fa-map-marker-alt"></i>
               <h3>Office address</h3>
               <a href="#">2128, Victoria Society, Sector 50, Chandigarh, India</a>
            </div>

         </div>

      </section>

   </div>

   <footer class="footer">
      Copyright &copy; 2026 <span style="color: var(--main-color);">Educa.</span> | All rights reserved!
   </footer>

   <!-- custom js file link  -->
   <script src="js/script.js"></script>
   <script src="js/auth.js"></script>

   <script>
      function handleContactSubmit() {
         var nameVal  = document.querySelector('.contact form input[name="name"]').value.trim();
         var emailVal = document.querySelector('.contact form input[name="email"]').value.trim();
         var numVal   = document.querySelector('.contact form input[name="number"]').value.trim();
         var msgVal   = document.querySelector('.contact form textarea[name="msg"]').value.trim();

         if (!nameVal || !emailVal || !numVal || !msgVal) {
            showToast('Please fill in all fields before sending.', 'error');
            return;
         }

         // Clear the form fields but keep the form fully visible
         document.querySelector('.contact form input[name="name"]').value = '';
         document.querySelector('.contact form input[name="email"]').value = '';
         document.querySelector('.contact form input[name="number"]').value = '';
         document.querySelector('.contact form textarea[name="msg"]').value = '';

         showToast('Your message has been sent! We will get back to you within 24 hours.', 'success');
      }

      function showToast(message, type) {
         // Remove any existing toast
         var existing = document.getElementById('educa-toast');
         if (existing) existing.remove();

         var toast = document.createElement('div');
         toast.id = 'educa-toast';
         toast.textContent = message;
         toast.style.cssText = [
            'position: fixed',
            'bottom: 8rem',
            'left: 50%',
            'transform: translateX(-50%) translateY(20px)',
            'background-color: ' + (type === 'success' ? 'var(--main-color)' : 'var(--red)'),
            'color: #fff',
            'padding: 1.4rem 3rem',
            'border-radius: 0.6rem',
            'font-size: 1.6rem',
            'font-family: inherit',
            'box-shadow: 0 6px 24px rgba(0,0,0,0.18)',
            'z-index: 9999',
            'opacity: 0',
            'transition: opacity 0.3s ease, transform 0.3s ease',
            'max-width: 50rem',
            'text-align: center'
         ].join('; ');

         document.body.appendChild(toast);

         // Trigger animation
         requestAnimationFrame(function() {
            requestAnimationFrame(function() {
               toast.style.opacity = '1';
               toast.style.transform = 'translateX(-50%) translateY(0)';
            });
         });

         // Auto remove after 4 seconds
         setTimeout(function() {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(20px)';
            setTimeout(function() {
               if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 300);
         }, 4000);
      }
   </script>

</body>

</html>
