<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Register - Educa.</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
   <link rel="stylesheet" href="css/style.css">
</head>
<body>
   <header class="header">
      <section class="flex">
         <a href="index.html" class="logo">Educa.</a>
         <nav class="header-nav">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="courses.html">Courses</a>
            <a href="contact.html">Contact us</a>
         </nav>
         <div class="icons">
            <div id="toggle-btn" class="fas fa-sun"></div>
            <div id="user-btn" class="fas fa-user"></div>
         </div>
         <div class="profile">
            <img src="images/pic-1.jpg" class="image" alt="">
            <h3 class="name" id="header-user-name">Guest</h3>
            <p class="role">Student</p>
            <div class="flex-btn">
               <a href="login.html" class="option-btn">Login</a>
               <a href="register.html" class="option-btn">Register</a>
            </div>
         </div>
      </section>
   </header>
   <section class="form-container">
      <form id="register-form" onsubmit="return false;">
         <h3>Register now</h3>
         <p>Your name <span>*</span></p>
         <input type="text" id="reg-name" placeholder="Enter your name" required maxlength="50" class="box">
         <p>Your email <span>*</span></p>
         <input type="email" id="reg-email" placeholder="Enter your email" required maxlength="50" class="box">
         <p>Your password <span>*</span></p>
         <input type="password" id="reg-pass" placeholder="Enter your password" required maxlength="20" class="box">
         <p>Confirm password <span>*</span></p>
         <input type="password" id="reg-cpass" placeholder="Confirm your password" required maxlength="20" class="box">
         <p id="reg-error" style="color: var(--red); font-size: 1.4rem; display:none; padding-top:0.5rem;"></p>
         <p id="reg-success" style="color: #27ae60; font-size: 1.4rem; display:none; padding-top:0.5rem;"></p>
         <button type="button" onclick="handleRegister()" class="btn" id="register-submit-btn">Register</button>
         <p style="padding-top: 1.5rem; font-size: 1.5rem; text-align:center; color: var(--light-color);">
            Already have an account? <a href="login.html" style="color: var(--main-color);">Login now</a>
         </p>
      </form>
   </section>
   <footer class="footer">
      Copyright &copy; 2026 <span style="color: var(--main-color);">Educa.</span> | All rights reserved!
   </footer>
   <script src="js/script.js"></script>
   <script src="js/auth.js"></script>
   <script>
      function handleRegister() {
         const name = document.getElementById('reg-name').value.trim();
         const email = document.getElementById('reg-email').value.trim();
         const pass = document.getElementById('reg-pass').value;
         const cpass = document.getElementById('reg-cpass').value;
         const errorEl = document.getElementById('reg-error');
         const successEl = document.getElementById('reg-success');
         errorEl.style.display = 'none';
         successEl.style.display = 'none';
         if (!name || !email || !pass || !cpass) {
            errorEl.textContent = 'Please fill in all fields.';
            errorEl.style.display = 'block';
            return;
         }
         if (pass !== cpass) {
            errorEl.textContent = 'Passwords do not match!';
            errorEl.style.display = 'block';
            return;
         }
         if (pass.length < 4) {
            errorEl.textContent = 'Password must be at least 4 characters.';
            errorEl.style.display = 'block';
            return;
         }
         const result = registerUser(name, email, pass);
         if (result.success) {
            successEl.textContent = result.message + ' Redirecting...';
            successEl.style.display = 'block';
            setTimeout(() => { window.location.href = 'home.html'; }, 1000);
         } else {
            errorEl.textContent = result.message;
            errorEl.style.display = 'block';
         }
      }
   </script>
</body>
</html>
